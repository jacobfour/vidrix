<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VIDRIX</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: white;
            color: #333;
        }

        header {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background: white;
            border-bottom: 2px solid #f2f2f2;
            cursor: pointer;
        }

        header img {
            height: 45px;
            margin-right: 10px;
        }

        header h1 {
            font-size: 26px;
            color: #ff7a1a;
        }

        .search-container {
            margin-left: auto;
        }

        #searchInput {
            padding: 10px;
            width: 250px;
            border-radius: 20px;
            border: 2px solid #ff8c3a;
        }

        #home {
            padding: 25px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .video {
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            position: relative;
        }

        .video:hover {
            background: #ffe3cc;
        }

        .video-title {
            margin-top: 8px;
        }

        .thumb-video {
            display: none;
        }

        .thumb-canvas {
            width: 100%;
            height: 170px;
            border-radius: 8px;
            background: #ccc;
        }

        .duration {
            position: absolute;
            bottom: 45px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 6px;
            font-size: 12px;
            border-radius: 4px;
        }

        #watchPage {
            display: none;
            padding: 30px;
            text-align: center;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 10px;
        }

        .video-actions {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .like-btn,
        .sub-btn {
            background: #ff8c3a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .back {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 22px;
            background: #ff8c3a;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header onclick="goHome()">
        <img src="assets/logo.png" alt="Logo">
        <h1>VIDRIX</h1>

        <div class="search-container" onclick="event.stopPropagation()">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchVideos()">
        </div>

    </header>

    <div id="home">
        <h2>Recommended</h2>

        <div class="video-grid">

            <div class="video" onclick="watchVideo('video1.mp4','Video 1')">
                <video class="thumb-video" src="video1.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Video 1</div>
            </div>

            <div class="video" onclick="watchVideo('video2.mp4','Roblox fire')">
                <video class="thumb-video" src="video2.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Roblox fire</div>
            </div>

            <div class="video" onclick="watchVideo('video3.mp4','Memes')">
                <video class="thumb-video" src="video3.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Memes</div>
            </div>

            <div class="video" onclick="watchVideo('video4.mp4','Minecraft Diamond house')">
                <video class="thumb-video" src="video4.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Minecraft Diamond house</div>
            </div>

            <div class="video" onclick="watchVideo('video5.mp4','Video 5')">
                <video class="thumb-video" src="video5.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Video 5</div>
            </div>

            <div class="video" onclick="watchVideo('video6.mp4','Video 6')">
                <video class="thumb-video" src="video6.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Video 6</div>
            </div>

            <div class="video" onclick="watchVideo('video7.mp4','Video 7')">
                <video class="thumb-video" src="video7.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Video 7</div>
            </div>

            <div class="video" onclick="watchVideo('video8.mp4','Video 8')">
                <video class="thumb-video" src="video8.mp4"></video>
                <canvas class="thumb-canvas"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Video 8</div>
            </div>

        </div>
    </div>

    <div id="watchPage">
        <video id="player" controls></video>
        <h2 id="videoTitle"></h2>

        <div class="video-actions">
            <button class="like-btn" onclick="likeVideo()">👍 Like <span id="likeCount">0</span></button>
            <button class="sub-btn" onclick="subscribe()">🔔 Subscribe</button>
        </div>

        <div class="back" onclick="goHome()">⬅ Back</div>
    </div>

    <script>

        let likes = 0
        let subscribed = false

        function watchVideo(file, title) {
            document.getElementById("home").style.display = "none"
            document.getElementById("watchPage").style.display = "block"
            document.getElementById("player").src = file
            document.getElementById("videoTitle").innerText = title
            likes = 0
            document.getElementById("likeCount").innerText = likes
        }

        function goHome() {
            document.getElementById("watchPage").style.display = "none"
            document.getElementById("home").style.display = "block"
        }

        function likeVideo() {
            likes++
            document.getElementById("likeCount").innerText = likes
        }

        function subscribe() {
            let btn = document.querySelector(".sub-btn")
            btn.innerText = subscribed ? "🔔 Subscribe" : "🔔 Subscribed"
            subscribed = !subscribed
        }

        function searchVideos() {
            let input = document.getElementById("searchInput").value.toLowerCase()
            document.querySelectorAll(".video").forEach(v => {
                v.style.display = v.innerText.toLowerCase().includes(input) ? "block" : "none"
            })
        }

        /* 🔥 SUPER FIXED THUMBNAILS */

        window.onload = function () {

            document.querySelectorAll(".video").forEach(div => {

                let video = div.querySelector(".thumb-video")
                let canvas = div.querySelector(".thumb-canvas")
                let durationText = div.querySelector(".duration")
                let ctx = canvas.getContext("2d")

                video.preload = "auto"
                video.muted = true

                video.addEventListener("loadedmetadata", () => {

                    // duration
                    let d = video.duration
                    durationText.innerText =
                        Math.floor(d / 60) + ":" + String(Math.floor(d % 60)).padStart(2, "0")

                    // keep trying until frame works
                    let tries = 0
                    function capture() {

                        if (video.readyState >= 2) {
                            video.currentTime = d / 2
                        } else if (tries < 10) {
                            tries++
                            setTimeout(capture, 200)
                        }

                    }

                    capture()

                })

                video.addEventListener("seeked", () => {

                    canvas.width = video.videoWidth
                    canvas.height = video.videoHeight

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height)

                })

                video.load()

            })

        }

    </script>

</body>

</html>
