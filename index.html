<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VIDRIX</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: white;
            color: #333;
        }

        header {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background: white;
            border-bottom: 2px solid #f2f2f2;
            cursor: pointer;
        }

        header img {
            height: 45px;
            margin-right: 10px;
        }

        header h1 {
            font-size: 26px;
            color: #ff7a1a;
        }

        .search-container {
            margin-left: auto;
        }

        #searchInput {
            padding: 10px;
            width: 250px;
            border-radius: 20px;
            border: 2px solid #ff8c3a;
        }

        #home {
            padding: 25px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .video {
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            position: relative;
        }

        .video:hover {
            background: #ffe3cc;
        }

        .video-title {
            margin-top: 8px;
        }

        .thumb-video {
            display: none;
        }

        .thumb-canvas {
            width: 100%;
            height: 170px;
            border-radius: 8px;
            background: #ccc;
        }

        .thumb-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 8px;
        }

        .duration {
            position: absolute;
            bottom: 45px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 6px;
            font-size: 12px;
            border-radius: 4px;
        }

        #watchPage {
            display: none;
            padding: 30px;
            text-align: center;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 10px;
        }

        .video-actions {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .like-btn,
        .sub-btn {
            background: #ff8c3a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .back {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 22px;
            background: #ff8c3a;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header onclick="goHome()">
        <img src="assets/logo.png" alt="Logo">
        <h1>VIDRIX</h1>

        <div class="search-container" onclick="event.stopPropagation()">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchVideos()">
        </div>

    </header>

    <div id="home">
        <h2>Recommended</h2>

        <div class="video-grid">

            <!-- https://youtu.be/suzJaNyXaNc -->
            <div class="video" data-youtube="suzJaNyXaNc" onclick="watchVideo('youtube:suzJaNyXaNc','Roblox fire')">
                <img class="thumb-img" src="https://img.youtube.com/vi/suzJaNyXaNc/hqdefault.jpg" alt="Roblox fire">
                <canvas class="thumb-canvas" style="display: none"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Roblox fire</div>
            </div>

            <!-- https://youtu.be/wEX-ta1WAyY -->
            <div class="video" data-youtube="wEX-ta1WAyY" onclick="watchVideo('youtube:wEX-ta1WAyY','Memes')">
                <img class="thumb-img" src="https://img.youtube.com/vi/wEX-ta1WAyY/hqdefault.jpg" alt="Memes">
                <canvas class="thumb-canvas" style="display: none"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Memes</div>
            </div>

            <!-- https://youtu.be/G7dDt6wknGk -->
            <div class="video" data-youtube="G7dDt6wknGk" onclick="watchVideo('youtube:G7dDt6wknGk','Minecraft Diamond house')">
                <img class="thumb-img" src="https://img.youtube.com/vi/G7dDt6wknGk/hqdefault.jpg" alt="Minecraft Diamond house">
                <canvas class="thumb-canvas" style="display: none"></canvas>
                <div class="duration">0:00</div>
                <div class="video-title">Minecraft Diamond house</div>
            </div>


        </div>
    </div>

    <div id="watchPage">
        <div id="player"></div>
        <h2 id="videoTitle"></h2>

        <div class="video-actions">
            <button class="like-btn" onclick="likeVideo()">👍 Like <span id="likeCount">0</span></button>
            <button class="sub-btn" onclick="subscribe()">🔔 Subscribe</button>
        </div>

        <div class="back" onclick="goHome()">⬅ Back</div>
    </div>

    <script>

        let likes = 0
        let subscribed = false

        function watchVideo(file, title) {
            document.getElementById("home").style.display = "none"
            document.getElementById("watchPage").style.display = "block"
            const player = document.getElementById("player")
            // youtube embed
            if (file.startsWith("youtube:")) {
                const id = file.split(":")[1]
                player.innerHTML = `<iframe width="100%" height="500" src="https://www.youtube.com/embed/${id}?rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
            } else {
                player.innerHTML = `<video controls src="${file}" style="width:100%;max-width:900px;border-radius:10px"></video>`
            }
            
            document.getElementById("videoTitle").innerText = title
            likes = 0
            document.getElementById("likeCount").innerText = likes
        }

        function goHome() {
            // stop and unload any media in the player (video or iframe)
            const player = document.getElementById("player")
            const videoEl = player.querySelector("video")
            const iframeEl = player.querySelector("iframe")

            if (videoEl) {
                try { videoEl.pause() } catch (e) {}
                try { videoEl.currentTime = 0 } catch (e) {}
                // remove source and reload to free resources
                videoEl.removeAttribute("src")
                try { videoEl.load() } catch (e) {}
            }

            if (iframeEl) {
                // stop iframe playback by removing its src
                try { iframeEl.src = "" } catch (e) {}
            }

            // clear player DOM so nothing continues in background
            player.innerHTML = ""

            document.getElementById("watchPage").style.display = "none"
            document.getElementById("home").style.display = "block"
         }

        function likeVideo() {
            likes++
            document.getElementById("likeCount").innerText = likes
        }

        function subscribe() {
            let btn = document.querySelector(".sub-btn")
            btn.innerText = subscribed ? "🔔 Subscribe" : "🔔 Subscribed"
            subscribed = !subscribed
        }

        function searchVideos() {
            let input = document.getElementById("searchInput").value.toLowerCase()
            document.querySelectorAll(".video").forEach(v => {
                v.style.display = v.innerText.toLowerCase().includes(input) ? "block" : "none"
            })
        }

        /* 🔥 SUPER FIXED THUMBNAILS */

        window.onload = function () {

            document.querySelectorAll(".video").forEach(div => {

                let video = div.querySelector(".thumb-video")
                let canvas = div.querySelector(".thumb-canvas")
                let durationText = div.querySelector(".duration")
                let ctx = canvas.getContext("2d")

                video.preload = "auto"
                video.muted = true

                video.addEventListener("loadedmetadata", () => {

                    // duration
                    let d = video.duration
                    durationText.innerText =
                        Math.floor(d / 60) + ":" + String(Math.floor(d % 60)).padStart(2, "0")

                    // keep trying until frame works
                    let tries = 0
                    function capture() {

                        if (video.readyState >= 2) {
                            video.currentTime = d / 2
                        } else if (tries < 10) {
                            tries++
                            setTimeout(capture, 200)
                        }

                    }

                    capture()

                })

                video.addEventListener("seeked", () => {

                    canvas.width = video.videoWidth
                    canvas.height = video.videoHeight

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height)

                })

                video.load()

            })

        }

    </script>

</body>

</html>
